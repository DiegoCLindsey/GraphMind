<div id="topbar">
  <button id="hamburger" onclick="toggleSidebar()" style="display:none;background:none;border:none;color:var(--t2);cursor:pointer;font-size:20px;padding:2px 8px;border-radius:5px;line-height:1;flex-shrink:0">☰</button>
  <span id="logo">⬡ <span class="logo-text">GraphMind</span></span>
  <span class="vdiv"></span>
  <button class="tab on" id="tab-e" onclick="switchView('editor')"><span class="tab-icon">✎</span><span class="tab-label" data-i18n="topbar.tab_tasks"> Tareas</span></button>
  <button class="tab" id="tab-g" onclick="switchView('graph')"><span class="tab-icon">⬡</span><span class="tab-label" data-i18n="topbar.tab_graph"> Grafo</span></button>
  <button class="tab" id="tab-gantt" onclick="switchView('gantt')"><span class="tab-icon">▤</span><span class="tab-label" data-i18n="topbar.tab_gantt"> Gantt</span></button>
  <button class="tab" id="tab-cfg"   onclick="switchView('config')"><span class="tab-icon">⚙</span><span class="tab-label" data-i18n="topbar.tab_config"> Config</span></button>
  <button class="tab" id="tab-help"  onclick="switchView('help')"><span class="tab-icon">?</span><span class="tab-label" data-i18n="topbar.tab_help"> Ayuda</span></button>
  <div class="spacer"></div>
  <span id="note-count">0 nodos</span>
  <span class="vdiv tb-only"></span>
  <button class="tbtn tb-only" onclick="recalcAll()" data-i18n-title="topbar.recalc" title="Recalcular todos los padres" style="color:var(--accent)">↻ <span class="tbtn-label" data-i18n="topbar.recalc">Recalcular</span></button>
  <span class="vdiv tb-only"></span>
  <button class="tbtn" onclick="openIO('export')" data-i18n-title="topbar.export" title="Exportar JSON"><span class="tbtn-icon">↑</span><span class="tbtn-label" data-i18n="topbar.export"> Exportar</span></button>
  <button class="tbtn" onclick="openIO('import')" data-i18n-title="topbar.import" title="Importar JSON"><span class="tbtn-icon">↓</span><span class="tbtn-label" data-i18n="topbar.import"> Importar</span></button>
  <span class="vdiv"></span>
  <button id="lang-toggle" class="tbtn" onclick="setLocale(getLocale()==='es'?'en':'es')" title="Switch language" style="font-size:16px;padding:2px 6px">🇬🇧</button>
</div>
