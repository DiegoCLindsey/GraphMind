<div id="editor-view">

  <div id="empty-state">
    <div class="ei">⬡</div>
    <p style="font-size:12px">Selecciona o crea una tarea</p>
  </div>

  <div id="node-editor">

    <!-- EDITOR HEADER -->
    <div id="eh">
      <div id="eh-row1">
        <input id="node-title" type="text" placeholder="Título de la tarea..." oninput="saveNode()">
        <select id="type-select"   onchange="saveNode(); renderAgg()"></select>
        <select id="status-select" onchange="saveNode(); renderList()"></select>
      </div>

      <div id="tag-row">
        <span id="tags-c"></span>
        <input id="tag-inp" type="text" placeholder="+ tag" onkeydown="handleTag(event)">
      </div>

      <!-- METRICS -->
      <button id="metrics-collapse-btn" onclick="toggleMetrics()" style="display:none;width:100%;background:none;border:none;border-top:1px solid var(--b1);color:var(--t3);font-size:10px;font-family:var(--mono);padding:5px 0;cursor:pointer;text-align:left;padding-left:2px;gap:6px;align-items:center">
        <span id="metrics-toggle-icon">▼</span> <span id="metrics-toggle-label">DETALLES</span>
      </button>
      <div id="metrics-grid">
        <div class="mfield">
          <label>Asignado a</label>
          <input id="f-assignee" type="text" placeholder="Nombre..." oninput="saveNode()">
        </div>
        <div class="mfield">
          <label>Fecha inicio</label>
          <input id="f-start" type="date" oninput="saveNode()">
        </div>
        <div class="mfield">
          <label>Fecha fin</label>
          <input id="f-end" type="date" oninput="saveNode()">
        </div>
        <div class="mfield">
          <label>Fecha límite</label>
          <input id="f-deadline" type="date" oninput="saveNode()">
        </div>
        <div class="mfield">
          <label>Duración (días)</label>
          <input id="f-hours" type="number" min="0" step="0.5" placeholder="0.0" oninput="onDurationChange()">
        </div>
        <div class="mfield">
          <label>Coste est. (€)</label>
          <input id="f-cost" type="number" min="0" step="0.01" placeholder="0.00" oninput="saveNode(); renderAgg()">
        </div>
        <div class="mfield">
          <label>Completitud (%)</label>
          <input id="f-completion" type="number" min="0" max="100" step="1" placeholder="0" oninput="saveNode(); renderList()">
        </div>
        <div class="mfield">
          <label>Prioridad</label>
          <select id="f-priority" onchange="saveNode()">
            <option value="">—</option>
            <option value="low">Baja</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="critical">Crítica</option>
          </select>
        </div>
      </div>

      <div id="eh-snap-bar" onclick="toggleEhSnap()"></div>
      <!-- AGGREGATED FROM CHILDREN -->
      <div id="agg-bar">
        <div class="agg-title" style="display:flex;align-items:center;gap:8px">Agregado de hijos ▾ <span id="agg-cp-badge" style="display:none;font-size:9px;padding:1px 7px;border-radius:20px;background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.35);color:var(--danger);font-family:var(--mono)">CAMINO CRÍTICO</span></div>
        <div id="agg-metrics"></div>
        <div id="agg-progress-wrap">
          <div id="agg-progress-label"><span>Progreso conjunto</span><span id="agg-pct">0%</span></div>
          <div id="agg-progress-bar"><div id="agg-progress-fill" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <!-- CONNECTIONS -->
    <div id="conn-row">
      <span class="conn-lbl">Conexiones</span>
      <div id="conn-display"></div>
      <button class="cp" onclick="openConnModal()" style="border-style:dashed;font-size:10px">+ enlazar</button>
    </div>

    <!-- BODY + COMMENTS -->
    <div id="editor-body-area">
      <div id="body-wrap">
        <textarea id="node-body" placeholder="Descripción, notas, contexto..." rows="4" oninput="saveNode()"></textarea>
      </div>
      <div id="comments-section">
        <div id="comments-title">Comentarios</div>
        <div id="comments-list"></div>
        <div id="new-comment">
          <input id="comment-author-inp" type="text" placeholder="Tu nombre">
          <textarea id="comment-inp" rows="2" placeholder="Añadir comentario..."></textarea>
          <button id="add-comment-btn" onclick="addComment()">Enviar</button>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span id="sb-created"></span>
      <span id="sb-updated"></span>
      <span id="sb-save-indicator" style="font-size:10px;font-family:var(--mono);color:var(--accent);opacity:0;transition:opacity .4s;margin-left:8px"></span>
      <div class="spacer"></div>
      <button id="del-node-btn" onclick="deleteNode()" style="color:var(--danger)">✕ Borrar tarea</button>
    </div>
  </div><!-- /node-editor -->
</div><!-- /editor-view -->
