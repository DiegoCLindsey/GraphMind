<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphMind v1.5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<!-- Markdown + Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Base: design tokens, reset, layout -->
<link rel="stylesheet" href="css/base.css">
<!-- Components -->
<link rel="stylesheet" href="components/topbar/topbar.css">
<link rel="stylesheet" href="components/sidebar/sidebar.css">
<link rel="stylesheet" href="components/editor/editor.css">
<link rel="stylesheet" href="components/graph/graph.css">
<link rel="stylesheet" href="components/gantt/gantt.css">
<link rel="stylesheet" href="components/help/help.css">
<link rel="stylesheet" href="components/config/config.css">
<link rel="stylesheet" href="components/modals/modals.css">
<!-- Responsive cross-component (load last) -->
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- Anclas estructurales — loader.js inyecta los components/ HTML aquí -->
<div id="app">
  <div id="main"></div>
</div>

<!-- i18n: motor primero, luego todos los archivos de idioma -->
<script src="i18n/engine.js"></script>
<script src="i18n/es/common.js"></script>
<script src="i18n/es/topbar.js"></script>
<script src="i18n/es/sidebar.js"></script>
<script src="i18n/es/editor.js"></script>
<script src="i18n/es/graph.js"></script>
<script src="i18n/es/gantt.js"></script>
<script src="i18n/es/modals.js"></script>
<script src="i18n/es/config.js"></script>
<script src="i18n/en/common.js"></script>
<script src="i18n/en/topbar.js"></script>
<script src="i18n/en/sidebar.js"></script>
<script src="i18n/en/editor.js"></script>
<script src="i18n/en/graph.js"></script>
<script src="i18n/en/gantt.js"></script>
<script src="i18n/en/modals.js"></script>
<script src="i18n/en/config.js"></script>

<!-- Markdown/Mermaid helper -->
<script src="js/markdown.js"></script>
<!-- Help component -->
<script src="components/help/help.js"></script>

<!-- Core: estado global, datos, cálculos (sin componente) -->
<script src="js/defaults.js"></script>
<script src="js/state.js"></script>
<script src="js/planner.js"></script>
<script src="js/crud.js"></script>
<script src="js/aggregation.js"></script>

<!-- Editor component -->
<script src="components/editor/render.js"></script>
<script src="components/editor/tags.js"></script>
<script src="components/editor/connections.js"></script>
<script src="components/editor/comments.js"></script>
<script src="components/editor/breakdown.js"></script>

<!-- Graph component -->
<script src="components/graph/graph.js"></script>

<!-- Persistencia e IO -->
<script src="js/storage.js"></script>

<!-- UI e inicialización (cross-componente) -->
<script src="js/ui.js"></script>
<script src="js/init.js"></script>

<!-- Gantt component -->
<script src="components/gantt/gantt.js"></script>

<!-- Config component -->
<script src="components/config/config.js"></script>

<!-- Loader: fetch components/ HTML y arranca la app -->
<script src="js/loader.js"></script>

</body>
</html>
